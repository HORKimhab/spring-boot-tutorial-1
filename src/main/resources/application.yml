spring:
  config:
    import: optional:file:.env[.properties]  
  datasource:
    url: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://localhost:5432/springdb}
    username: ${SPRING_DATASOURCE_USERNAME:-springuser}
    password: ${SPRING_DATASOURCE_PASSWORD:-springpassword}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # jackson:
  #   property-naming-strategy: SNAKE_CASE  # ← maps firstName to first_name